<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cô Hoàng Mai - Trang chủ cá nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #333333;
            line-height: 1.6;
        }

        /* NAVBAR THANH ĐIỀU HƯỚNG GỐC CỦA CÔ: NỀN TRẮNG CHỮ XANH */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            color: #15803d;
            font-weight: 700;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px 0;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #15803d;
            font-weight: 700;
            border-bottom: 2px solid #15803d;
        }

        /* KHUNG HỘP NỀN ĐỎ CHUYÊN NGHIỆP BAO NỘI DUNG */
        .main-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            background-color: #b91c1c; /* Đỏ đô sang trọng */
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        /* KHỐI CHỮ TRẮNG RÕ NÉT */
        .intro-text {
            flex: 1.2;
        }

        .intro-text h1 {
            font-size: 3rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .intro-text .title-job {
            font-size: 1.4rem;
            color: #fca5a5;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .intro-text .title-school {
            font-size: 1.15rem;
            color: #fecdd3;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .intro-text .welcome-message {
            font-size: 1.1rem;
            color: #ffffff;
            text-align: justify;
            line-height: 1.7;
        }

        /* KHỐI ẢNH HÌNH TRÒN VIỀN GRADIENT KHÔNG LỖI */
        .intro-image-wrapper {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-circle {
            width: 340px;
            height: 340px;
            border-radius: 50%;
            padding: 6px; 
            background: linear-gradient(135deg, #15803d, #ffffff); 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #ffffff;
            display: block;
            transition: opacity 0.2s ease;
        }

        /* CHÂN TRANG LỊCH SỰ */
        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #cbd5e1;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .main-wrapper { margin: 15px; padding: 20px; }
            .hero-container { flex-direction: column-reverse; text-align: center; }
            .profile-circle { width: 260px; height: 260px; }
            .intro-text h1 { font-size: 2.3rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <i class="fa-solid fa-laptop-code"></i> Cô Hoàng Mai
        </a>
        <nav>
            <ul>
                <li><a onclick="changeContent('trangchu')" id="btn-trangchu" class="active">Trang chủ</a></li>
                <li><a onclick="changeContent('gioithieu')" id="btn-gioithieu">Giới thiệu</a></li>
                <li><a onclick="changeContent('giaoan')" id="btn-giaoan">Giáo án</a></li>
                <li><a onclick="changeContent('scratch')" id="btn-scratch">Dự án Scratch</a></li>
                <li><a onclick="changeContent('thuvien')" id="btn-thuvien">Thư viện ảnh</a></li>
                <li><a onclick="changeContent('tailieu')" id="btn-tailieu">Tài liệu</a></li>
                <li><a onclick="changeContent('lienhe')" id="btn-lienhe">Liên hệ</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-wrapper">
        <div class="hero-container">
            
            <div class="intro-text">
                <h1 id="page-name">Cô Hoàng Mai</h1>
                <div class="title
