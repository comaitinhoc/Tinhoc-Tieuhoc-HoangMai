<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÓC TIN HỌC SÁNG TẠO - CÔ HOÀNG MAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-shadow: none;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #f0f9ff; 
            color: #1e293b;
            padding: 20px 0;
        }

        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #ffffff; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-radius: 8px;
            overflow: hidden;
        }

        .header-banner {
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-banner i {
            font-size: 3.2rem;
            color: #b91c1c; 
        }

        .header-text h1 {
            color: #b91c1c;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .header-text p {
            color: #64748b;
            font-size: 1.05rem;
            margin-top: 5px;
        }

        .main-nav {
            background-color: #b91c1c; 
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
        }

        .nav-list li a {
            display: block;
            padding: 14px 22px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: background 0.2s;
            cursor: pointer;
        }

        .nav-list li a:hover, .nav-list li a.active {
            background-color: #991b1b; 
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 25px;
            padding: 25px;
            background-color: #ffffff;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget {
            border: 1px solid #b91c1c;
            border-radius: 4px;
            overflow: hidden;
        }

        .widget-title {
            background-color: #b91c1c; 
            color: #ffffff;
            padding: 12px 15px;
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .widget-content {
            list-style: none;
        }

        .widget-content li {
            border-bottom: 1px solid #f1f5f9;
        }

        .widget-content li a {
            display: block;
            padding: 12px 15px;
            color: #1e293b;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .widget-content li a:hover {
            background-color: #fef2f2; 
            color: #b91c1c;
        }

        .content-area {
            border: 1px solid #e2e8f0;
            padding: 25px;
            border-radius: 4px;
        }

        .content-title {
            color: #b91c1c;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px solid #b91c1c;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .search-filter-box {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 18px;
            border-radius: 6px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input {
            width: 100%;
            padding: 11px 11px 11px 38px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #b91c1c;
        }

        .filter-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64748b;
        }

        .filter-select {
            padding: 11px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.95rem;
            background-color: #ffffff;
            outline: none;
            cursor: pointer;
        }

        .teacher-info-box {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            align-items: start;
        }

        .info-text h2 {
            color: #b91c1c;
            font-size: 1.9rem;
            margin-bottom: 5px;
        }

        .info-text .role {
            color: #b91c1c;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 20px
